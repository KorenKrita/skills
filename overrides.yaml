skills:
  # ─── engineering plugin ────────────────────────────────────────────────────

  tdd:
    source:
      repo: mattpocock/skills
      path: skills/engineering/tdd
      ref: main
    plugin: engineering
    patches: []

  debug:
    source:
      repo: mattpocock/skills
      path: skills/engineering/diagnose
      ref: main
    plugin: engineering
    patches:
      - type: set_frontmatter
        field: name
        value: debug

  zoom-out:
    source:
      repo: mattpocock/skills
      path: skills/engineering/zoom-out
      ref: main
    plugin: engineering
    patches:
      - type: remove_frontmatter
        field: disable-model-invocation

  prototype:
    source:
      repo: mattpocock/skills
      path: skills/engineering/prototype
      ref: main
    plugin: engineering
    patches: []

  deepen:
    source:
      repo: mattpocock/skills
      path: skills/engineering/improve-codebase-architecture
      ref: main
    plugin: engineering
    patches:
      - type: set_frontmatter
        field: name
        value: deepen

  improve:
    source:
      repo: shadcn/improve
      path: skills/improve
      ref: main
    plugin: engineering
    patches: []

  hunt:
    source:
      repo: tw93/Waza
      path: skills/hunt
      ref: main
    plugin: engineering
    patches: []


  ocr:
    source:
      repo: alibaba/open-code-review
      path: plugins/open-code-review/skills/open-code-review
      ref: main
    plugin: engineering
    patches:
      - type: set_frontmatter
        field: name
        value: ocr

  # ─── thinking plugin ───────────────────────────────────────────────────────

  geju:
    source:
      repo: hylarucoder/hai-stack
      path: skills/geju
      ref: main
    plugin: thinking
    patches: []

  goudi:
    source:
      repo: hylarucoder/hai-stack
      path: skills/goudi
      ref: main
    plugin: thinking
    patches: []

  idea:
    source:
