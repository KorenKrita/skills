  nuclear-review:
    source: { repo: cursor/plugins, path: cursor-team-kit/skills/thermo-nuclear-code-quality-review, ref: main }
    plugin: plus
    patches:
      - { type: set_frontmatter, field: name, value: nuclear-review }
      - type: set_frontmatter
        field: description
        value: Run an extremely strict maintainability review for abstraction quality, giant files, and spaghetti-condition growth. Use for a nuclear review, deep code quality audit, or especially harsh maintainability review.
      - { type: replace_all, pattern: "Thermo-Nuclear Code Quality Review", with: "Nuclear Review" }
    extra_mappings:
      - from: cursor-team-kit/agents/thermo-nuclear-code-quality-review.md
        to: plugins/plus/agents/nuclear-review.md
        patches:
          - { type: set_frontmatter, field: name, value: nuclear-review }
          - type: set_frontmatter
            field: description
            value: Nuclear code quality audit for maintainability, structure, giant files, spaghetti growth, and code-judo opportunities. Invoked via Task after a parent gathers diff and file contents. Loads the rubric from the nuclear-review Skill in the plus plugin.
          - { type: replace_all, pattern: thermo-nuclear-code-quality-review, with: nuclear-review }
          - { type: replace_all, pattern: "Thermo-Nuclear Code Quality Review", with: "Nuclear Review" }
          - { type: replace_all, pattern: "cursor-team-kit plugin", with: "plus plugin" }

  geju:
    source: { repo: hylarucoder/hai-stack, path: skills/geju, ref: main }
    plugin: plus
    patches:
      - type: replace
        pattern: "For Chinese readers, see `SKILL.zh_CN.md`. The English `SKILL.md` is the execution source of truth.\n\n"
