          Invoke another Skill only when an installed Skill's description clearly matches the next subtask. Otherwise, complete the subtask directly with this workflow. Never require an uninstalled Skill.
    target_patches:
      - target: agents/openai.yaml
        patches:
          - { type: replace_all, pattern: "$hai-razor", with: "$razor" }
      - target: references/output-template.md
        patches:
          - { type: replace_all, pattern: hai-razor, with: razor }
          - type: replace_all
            pattern: "`hai-goal`"
            with: "an installed execution-planning Skill whose description clearly matches the task"
          - type: replace_all
            pattern: " (For a Chinese-led run, see `SKILL.zh_CN.md`.)"
            with: ""
    exclude_files:
      - SKILL.zh_CN.md
  read:
    source: { repo: tw93/Waza, path: skills/read, ref: main }
    plugin: plus
    patches:
      - type: replace
        pattern: "**Update check (non-blocking).** Once per conversation, run `bash <skill-base-dir>/scripts/check-update.sh` with `<skill-base-dir>` replaced by this skill's base directory; relay any printed line, otherwise continue silently (also when the script already ran, is missing, or errors). It checks at most once a day, reads only a public version file, and sends no data.\n\n"
        with: ""
    exclude_files:
      - scripts/check-update.sh

  pua:
    source: { repo: tanweai/pua, path: skills/pua, ref: main }
    plugin: plus
    patches: []
    exclude_files:
      - references/agent-team.md
      - references/p9-protocol.md
      - references/p10-protocol.md
      - references/teardown-protocol.md
      - references/evolution-protocol.md
      - references/survey.md

  goal-gen:
    source: { repo: joeseesun/qiaomu-goal-meta-skill, path: ., ref: main }
    plugin: plus
    patches:
      - { type: set_frontmatter, field: name, value: goal-gen }
    target_patches:
      - target: agents/interface.yaml
        patches:
          - { type: replace_all, pattern: "$qiaomu-goal-meta-skill", with: "$goal-gen" }
    exclude_files:
      - .gitignore
      - README.md
      - manifest.json

  i-have-adhd:
    source: { repo: ayghri/i-have-adhd, path: skills/i-have-adhd, ref: main }
    plugin: plus
    patches: []

  # Local Skill: plugins/plus/skills/fan-out
  # Independent hook: plugins/plus/hooks (obra/double-shot-latte)

  # ─── creative: design, writing, and visual output ──────────────────────────

  ui:
    source: { repo: tw93/Waza, path: skills/ui, ref: main }
    plugin: creative
    patches:
      - { type: set_frontmatter, field: name, value: ui }
      - type: replace
        pattern: "**Update check (non-blocking).** Once per conversation, run `bash <skill-base-dir>/scripts/check-update.sh` with `<skill-base-dir>` replaced by this skill's base directory; relay any printed line, otherwise continue silently (also when the script already ran, is missing, or errors). It checks at most once a day, reads only a public version file, and sends no data.\n\n"
        with: ""
    exclude_files:
      - scripts/check-update.sh

  web:
    source: { repo: KAOPU-XiaoPu/web-design, path: ., ref: main }
    plugin: creative
    patches:
      - { type: set_frontmatter, field: name, value: web }
      - type: replace
        pattern: "# Web Design\n"
        with: "# Web Design\n\n用户可以在 https://getdesign.md/ 挑选喜欢的 design，或者按照下述流程设计自己的 design。\n"
      - type: append_content
        text: |
          ## Worked Example

          Before drafting `DESIGN.md`, consult `docs/DESIGN.md` and its accompanying implementation as a worked example of specification structure and implementation fidelity. Treat it as a quality reference, not a visual template to copy.
    exclude_files:
      - .gitignore
      - README.md

  humanizer-zh:
    source: { repo: op7418/Humanizer-zh, path: ., ref: main }
    plugin: creative
    patches: []
    exclude_files:
      - .gitignore
      - README.md

  archify:
    source: { repo: tt-a1i/archify, path: archify, ref: main }
    plugin: creative
    patches:
      - type: set_frontmatter
        field: description
        value: Create professional architecture, workflow, sequence, data-flow, and lifecycle/state diagrams as explorable standalone HTML with SVG, pan/zoom, search, semantic relationship inspection, presentation mode, dark/light themes, optional motion, and PNG/JPEG/WebP/SVG/WebM export. Accepts plain-language descriptions or Mermaid flowchart, sequenceDiagram, and stateDiagram input, then lays diagrams out in Archify style. Use when the user asks for system or cloud architecture, infrastructure and network topology, security boundaries, technical or approval workflows, runbooks, CI/CD flows, API call sequences, request lifecycles, data pipelines, ETL/ELT, PII boundaries, data lineage, state machines, lifecycle/status transitions, or conversion/beautification of Mermaid diagrams.
      - type: replace_all
        pattern: "Every bundled scenario recipe is backed by a checked-in, validated example in `examples/` and a generated Proof Lab card. Use those examples as structural references rather than copying their domain facts. When changing a recipe or proof example in the repository, regenerate both `docs/guide.html` and `docs/gallery.html`; tests enforce that all 11 recipe proof IDs resolve and that each proof retains three named reader views."
        with: "Every bundled scenario recipe is backed by a checked-in, validated JSON example in `examples/`. Use those examples as structural references rather than copying their domain facts."
      - { type: replace_all, pattern: "`examples/web-app.html`", with: "`examples/web-app.architecture.json`" }
    target_patches:
      - target: package.json
        patches:
          - type: replace_all
            pattern: "    \"test:webm\": \"node test/webm-artifact.smoke.mjs\",\n    \"test\": \"npm run check:validators && node test/golden.mjs && node --test test/*.test.mjs\",\n"
            with: ""
      - target: schemas/README.md
        patches:
          - { type: replace_all, pattern: "`npm test`", with: "`npm run check:validators`" }
    exclude_files:
      - examples/dataflow-product-analytics.html
      - examples/lifecycle-agent-run.html
      - examples/sequence-cache-miss-request.html
      - examples/web-app-rendered.html
      - examples/workflow-agent-tool-call-rendered.html
      - test/

  kami:
    source: { repo: tw93/kami, path: plugins/kami/skills/kami, ref: main }
    plugin: creative
    patches:
      - type: replace
        pattern: "**Update check (non-blocking).** At the start of a task, run `bash scripts/check-update.sh`. It does a read-only version check at most once per day and prints one line when a newer kami is available; relay that line to the user, then continue. It sends no data, and fails silently when offline, sandboxed, or without `curl`. Never let it block the work.\n\n"
        with: ""
    target_patches:
      - target: scripts/package-skill.sh
        patches:
          - { type: replace_all, pattern: "  \"scripts/mcp_server.py\"\n", with: "" }
          - { type: replace_all, pattern: "|mcp_server", with: "" }
    exclude_files:
      - scripts/draft-release-notes.py
      - scripts/mcp_server.py
      - scripts/tests/test_build.py

  xiaohei:
    source: { repo: helloianneo/ian-xiaohei-illustrations, path: ian-xiaohei-illustrations, ref: main }
    plugin: creative
    patches:
      - { type: set_frontmatter, field: name, value: xiaohei }
    target_patches:
      - target: agents/openai.yaml
        patches:
          - { type: replace_all, pattern: "$ian-xiaohei-illustrations", with: "$xiaohei" }

  xiaohei2:
    source: { repo: helloianneo/ian-xiaohei-scenes, path: ian-xiaohei-scenes, ref: main }
    plugin: creative
    patches:
      - { type: set_frontmatter, field: name, value: xiaohei2 }
      - { type: replace_all, pattern: "$ian-xiaohei-illustrations", with: "$xiaohei" }
    target_patches:
      - target: agents/openai.yaml
        patches:
          - { type: replace_all, pattern: "$ian-xiaohei-scenes", with: "$xiaohei2" }
    exclude_files:
      - .gitignore
      - README.md
