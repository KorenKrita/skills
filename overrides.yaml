        field: name
        value: idea

  razor:
    source:
      repo: hylarucoder/hai-stack
      path: skills/hai-razor
      ref: main
    plugin: thinking
    patches:
      - type: set_frontmatter
        field: name
        value: razor

  grill-me:
    source:
      repo: mattpocock/skills
      path: skills/productivity/grill-me
      ref: main
    plugin: thinking
    patches: []

  grill-with-docs:
    source:
      repo: mattpocock/skills
      path: skills/engineering/grill-with-docs
      ref: main
    plugin: thinking
    patches: []

  think:
    source:
      repo: tw93/Waza
      path: skills/think
      ref: main
    plugin: thinking
    patches: []


  # ─── writing plugin ────────────────────────────────────────────────────────

  core:
    source:
      repo: tw93/Waza
      path: skills/write
      ref: main
    plugin: writing
    patches:
      - type: set_frontmatter
        field: name
        value: core

  noai:
    source:
      repo: op7418/Humanizer-zh
      path: .
      ref: main
    plugin: writing
    patches:
      - type: set_frontmatter
        field: name
        value: noai

  rewrite:
    source:
      repo: mattpocock/skills
      path: skills/personal/edit-article
      ref: main
    plugin: writing
    patches:
      - type: set_frontmatter
        field: name
        value: rewrite

  step:
    source:
      repo: mattpocock/skills
      path: skills/in-progress/writing-beats
      ref: main
    plugin: writing
    patches:
      - type: set_frontmatter
        field: name
        value: step

  collect:
    source:
      repo: mattpocock/skills
      path: skills/in-progress/writing-fragments
      ref: main
    plugin: writing
    patches:
      - type: set_frontmatter
        field: name
        value: collect

  build:
    source:
      repo: mattpocock/skills
      path: skills/in-progress/writing-shape
      ref: main
    plugin: writing
    patches:
      - type: set_frontmatter
        field: name
        value: build

  # ─── design plugin ─────────────────────────────────────────────────────────

  web:
    source:
      repo: KAOPU-XiaoPu/web-design
      path: .
      ref: main
    plugin: design
    patches:
      - type: set_frontmatter
        field: name
        value: web
      - type: replace
        pattern: "# Web Design\n"
        with: "# Web Design\n\n用户可以在 https://getdesign.md/ 挑选喜欢的 design，或者按照下述流程设计自己的 design。\n"

  ui:
    source:
      repo: tw93/Waza
      path: skills/design
      ref: main
    plugin: design
    patches:
      - type: set_frontmatter
        field: name
        value: ui

