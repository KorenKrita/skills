  goudi:
    source: { repo: hylarucoder/hai-stack, path: skills/goudi, ref: main }
    plugin: plus
    patches:
      - type: replace
        pattern: "For Chinese readers, see `SKILL.zh_CN.md`. The English `SKILL.md` is the execution source of truth.\n\n"
        with: ""
      - { type: replace_all, pattern: hai-idea, with: idea }
      - { type: replace_all, pattern: hai-tdd, with: tdd }
      - type: replace_all
        pattern: "`hai-goal`"
        with: "an installed execution-planning Skill whose description clearly matches the task"
      - type: append_content
        text: |
          ## Routing Compatibility

          Invoke another Skill only when an installed Skill's description clearly matches the next subtask. Otherwise, complete the subtask directly with this workflow. Never require an uninstalled Skill.
