name: 同步上游 Skill

on:
  schedule:
    - cron: "0 3 * * *" # 每天 UTC 3:00（北京时间 11:00）
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: 执行同步
        run: npx tsx scripts/sync.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
